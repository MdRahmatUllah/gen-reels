services:
  api:
    build:
      context: ./backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      APP_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:5173
      DATABASE_URL: postgresql+psycopg://reels:reels@postgres:5432/reels
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_REGION: us-east-1
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@reels.local
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-}
      AZURE_CONTENT_SAFETY_ENDPOINT: ${AZURE_CONTENT_SAFETY_ENDPOINT:-}
      AZURE_CONTENT_SAFETY_API_KEY: ${AZURE_CONTENT_SAFETY_API_KEY:-}
      AZURE_CONTENT_SAFETY_API_VERSION: ${AZURE_CONTENT_SAFETY_API_VERSION:-2024-09-15-preview}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker-planning:
    build:
      context: ./backend
    command: uv run celery -A app.workers.celery_app.celery_app worker -Q planning --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://reels:reels@postgres:5432/reels
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_REGION: us-east-1
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@reels.local
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-}
      AZURE_CONTENT_SAFETY_ENDPOINT: ${AZURE_CONTENT_SAFETY_ENDPOINT:-}
      AZURE_CONTENT_SAFETY_API_KEY: ${AZURE_CONTENT_SAFETY_API_KEY:-}
      AZURE_CONTENT_SAFETY_API_VERSION: ${AZURE_CONTENT_SAFETY_API_VERSION:-2024-09-15-preview}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker-render:
    build:
      context: ./backend
    command: uv run celery -A app.workers.celery_app.celery_app worker -Q render --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://reels:reels@postgres:5432/reels
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_REGION: us-east-1
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@reels.local
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-}
      AZURE_CONTENT_SAFETY_ENDPOINT: ${AZURE_CONTENT_SAFETY_ENDPOINT:-}
      AZURE_CONTENT_SAFETY_API_KEY: ${AZURE_CONTENT_SAFETY_API_KEY:-}
      AZURE_CONTENT_SAFETY_API_VERSION: ${AZURE_CONTENT_SAFETY_API_VERSION:-2024-09-15-preview}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  beat:
    build:
      context: ./backend
    command: uv run celery -A app.workers.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://reels:reels@postgres:5432/reels
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reels
      POSTGRES_USER: reels
      POSTGRES_PASSWORD: reels
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reels -d reels"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./backend/scripts/init-minio.sh:/scripts/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
